<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background -->
  <rect width="512" height="512" rx="96" fill="#0d1117"/>

  <!-- Upward trend bar chart (prediction market feel) -->
  <rect x="80"  y="320" width="64" height="112" rx="8" fill="#22c55e" opacity="0.7"/>
  <rect x="168" y="256" width="64" height="176" rx="8" fill="#22c55e" opacity="0.85"/>
  <rect x="256" y="192" width="64" height="240" rx="8" fill="#22c55e"/>
  <rect x="344" y="128" width="64" height="304" rx="8" fill="#3b82f6"/>

  <!-- Rising line overlay -->
  <polyline
    points="112,310 200,246 288,182 376,118"
    fill="none"
    stroke="#f59e0b"
    stroke-width="14"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Glowing dot at tip -->
  <circle cx="376" cy="118" r="18" fill="#f59e0b"/>
  <circle cx="376" cy="118" r="10" fill="#fff"/>

  <!-- "T" lettermark bottom-right (subtle brand) -->
  <text x="390" y="460" font-family="system-ui, sans-serif" font-size="72" font-weight="900" fill="#f59e0b" opacity="0.9">Y</text>
</svg>
