<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background -->
  <rect width="512" height="512" rx="100" fill="#0d1117"/>

  <!-- Subtle gold glow behind checkmark -->
  <ellipse cx="256" cy="300" rx="190" ry="155" fill="#f59e0b" opacity="0.06"/>

  <!-- Crown — 3 points, king energy -->
  <polygon points="256,52 296,108 346,70 322,148 190,148 166,70 216,108" fill="#f59e0b"/>
  <!-- Crown base bar -->
  <rect x="182" y="134" width="148" height="28" rx="7" fill="#f59e0b"/>

  <!-- Bold checkmark — hero element "I WAS RIGHT" -->
  <polyline
    points="80,290 205,415 432,155"
    fill="none"
    stroke="#f59e0b"
    stroke-width="72"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Inner highlight on checkmark for depth -->
  <polyline
    points="80,290 205,415 432,155"
    fill="none"
    stroke="#ffffff"
    stroke-width="20"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.18"
  />

  <!-- Exclamation dot — bottom right "!" energy -->
  <circle cx="434" cy="445" r="20" fill="#f59e0b"/>
</svg>
